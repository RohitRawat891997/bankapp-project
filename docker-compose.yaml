services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    env_file:
      - .env

    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_PORT: ${DB_PORT}
      MYSQL_RANDOM_ROOT_PASSWORD: "yes"

    volumes:
      - mysql-data:/var/lib/mysql

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

    networks:
      - bank-network

  bankapp:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: bankapp

    env_file:
      - .env

    depends_on:
      mysql:
        condition: service_healthy

    ports:
      - "8080:8080"

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s     

    security_opt:
      - no-new-privileges:true

    read_only: true

    tmpfs:
      - /tmp

    networks:
      - bank-network

volumes:
  mysql-data:

networks:
  bank-network:
    driver: bridge
