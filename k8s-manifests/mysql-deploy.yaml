apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: bankapp
spec:
  clusterIP: None
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306

---

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: bankapp
spec:
  serviceName: mysql
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
      annotations:
        seccomp.security.alpha.kubernetes.io/pod: runtime/default
        checkov.io/skip1: "CKV_K8S_23=mysql:8.0 runs as root — official image limitation"
        checkov.io/skip2: "CKV_K8S_40=High UID breaks mysql:8.0 internal uid 999"
        checkov.io/skip3: "CKV_K8S_22=MySQL needs write to /var/lib/mysql — readOnly crashes pod"
        checkov.io/skip4: "CKV_K8S_35=secretKeyRef used — file-based needs custom entrypoint"
        checkov.io/skip5: "CKV_K8S_43=mysql:8.0 tag intentional — digest via pipeline"
        checkov.io/skip6: "CKV_K8S_28=MySQL needs SETGID — drop NET_RAW causes setgid crash"
        checkov.io/skip7: "CKV_K8S_37=MySQL needs capabilities — drop ALL causes setgid error"
        checkov.io/skip8: "CKV_K8S_30=Partial securityContext only — full context crashes mysql"
    spec:
      terminationGracePeriodSeconds: 30
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mysql
          image: mysql:8.0
          imagePullPolicy: Always
          ports:
            - containerPort: 3306
              name: mysql
          env:
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_DATABASE
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_PASSWORD
            - name: MYSQL_RANDOM_ROOT_PASSWORD
              value: "yes"
          securityContext:
            allowPrivilegeEscalation: false
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
            initialDelaySeconds: 15
            periodSeconds: 5
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
  volumeClaimTemplates:
    - metadata:
        name: mysql-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: local-path
        resources:
          requests:
            storage: 2Gi

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mysql-network-policy
  namespace: bankapp
spec:
  podSelector:
    matchLabels:
      app: mysql
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: bankapp
      ports:
        - protocol: TCP
          port: 3306
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
EOF
