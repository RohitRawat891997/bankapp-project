# Trigger Test 
name: Bankapp DevSecOps CICD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'pom.xml'
      - '.github/workflows/ci.yaml'
      - '.github/workflows/cd.yaml'
      - 'terraform/**'

jobs:
  gitleaks-scan:
    name: Gitleaks Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v7

      - name: Run Gitleaks Scan
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            zricethezav/gitleaks:latest detect \
            --source=/repo \
            --report-format=json \
            --report-path=/repo/gitleaks-report.json \
            --redact \
            --exit-code=1

      - name: Upload Gitleaks Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          if-no-files-found: warn

  checkov-terraform:
    name: Checkov Terraform Scan
    runs-on: ubuntu-latest
    needs: gitleaks-scan

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Checkov
        run: pip install checkov

      - name: Run Checkov Terraform Scan
        run: |
          checkov -d . \
            --framework terraform \
            --output json \
            --output-file-path checkov-terraform-report.json

      - name: Upload Checkov Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkov-terraform-repor
          path: checkov-terraform-report.json
          if-no-files-found: warn

  checkov-k8s:
    name: Checkov Kubernetes Scan
    runs-on: ubuntu-latest
    needs: gitleaks-scan

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Checkov
        run: pip install checkov

      - name: Run Checkov Kubernetes scan
        run: |
          checkov -d . \
            --framework kubernetes \
            --output json \
            --output-file-path checkov-k8s-report.json

      - name: Upload Checkov Kubernetes report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkov-k8s-report
          path: checkov-k8s-report.json
          if-no-files-found: warn

  checkov-dockerfile:
    name: Checkov Dockerfile Scan
    runs-on: ubuntu-latest
    needs: gitleaks-scan

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Checkov
        run: pip install checkov

      - name: Run Checkov Dockerfile scan
        run: |
          checkov -d . \
            --framework dockerfile \
            --output json \
            --output-file-path checkov-dockerfile-report.json

      - name: Upload Checkov Dockerfile report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkov-dockerfile-report
          path: checkov-dockerfile-report.json
          if-no-files-found: warn

  src-trivy-fs:
    name: Src Trivy FS Scan
    runs-on: ubuntu-latest
    needs: gitleaks-scan

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.6
        with:
          version: latest
          cache: true

      - name: Verify Trivy installation
        run: |
          trivy --version
          which trivy

      - name: Run Trivy FS scan on src (TABLE)
        run: |
          trivy fs ./src \
            --format table \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 1 > src-trivy-fs-report.txt

      - name: Upload src Trivy TABLE report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: src-trivy-fs-table-report
          path: src-trivy-fs-report.txt
          if-no-files-found: warn

  docker:
    name: Docker Build & Push
    needs:
      - src-trivy-fs
      - checkov-k8s
      - checkov-dockerfile
      - checkov-terraform

    runs-on: ubuntu-latest

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build
        uses: docker/build-push-action@v7
        with:
          load: true
          push: false
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/bankapp:${{ github.sha }}
            ${{ vars.DOCKERHUB_USERNAME }}/bankapp:latest

      - name: Generate source SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: source-sbom.spdx.json
          upload-artifact: true

      - name: Generate image SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ vars.DOCKERHUB_USERNAME }}/bankapp:${{ github.sha }}
          format: spdx-json
          output-file: image-sbom.spdx.json
          upload-artifact: true

      - name: Push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/bankapp:${{ github.sha }}
            ${{ vars.DOCKERHUB_USERNAME }}/bankapp:latest

  update-qa-manifest:
      name: Update Kubernetes Manifest
      needs: docker
      runs-on: ubuntu-latest
      permissions:
         contents: write
     steps:
       - name: Checkout kubernetes branch
         uses: actions/checkout@v4
         with:
           ref: kubernetes
       - name: Update image tag in manifest
         run: |
           sed -i "s|image: ${{ vars.DOCKERHUB_USERNAME }}/bankapp:.*|image: ${{ vars.DOCKERHUB_USERNAME }}/bankapp:${GITHUB_SHA}|g" k8-manifests/app-deployment.yaml
       - name: Show updated manifest (debug)
         run: |
           cat k8-manifests/app-deployment.yaml
       - name: Commit and push changes
         run: |
           git config user.name "github-actions[bot]"
           git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
           git add k8-manifests/app-deployment.yaml
           git commit -m "Update kubernetes image to ${GITHUB_SHA} [skip ci]" || echo "No changes to commit"
           git push origin kubernetes
